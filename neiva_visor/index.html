    <script>
      //CODIGO QUE ME TRAE EL NUMERO PREDIAL
      //CONFIGURA EL LA VISTA PARA QUE POR DEFECTO SE MARQUE LA BUSQUE 
      //POR NUMERO PREDIAL E INGRESE EL NPN SELECCIONADO EN LA VISTA ANTERIOR
      document.addEventListener("DOMContentLoaded", function () {
          const params = new URLSearchParams(window.location.search);
          const valor = params.get("valor");

          // 1. Seleccionar capa "Terreno"
          const selectCapa = document.getElementById("filtro-capa");
          if (selectCapa) {
              selectCapa.value = "Terreno";
              actualizarCampos(); // carga los campos de esa capa
          }

          // 2. Esperar hasta que aparezca la opción "Número Predial"
          const interval = setInterval(() => {
              const selectCampo = document.getElementById("filtro-campo");
              if (selectCampo && selectCampo.options.length > 0) {
                  for (let i = 0; i < selectCampo.options.length; i++) {
                      if (selectCampo.options[i].text.trim() === "Número Predial") {
                          selectCampo.selectedIndex = i;
                          clearInterval(interval); // detenemos el loop

                          // 3. Colocar el valor de la URL
                          const inputValor = document.getElementById("filtro-valor");
                          if (valor && inputValor) {
                              inputValor.value = valor;
                          }

                          // 4. Ejecutar búsqueda automática
                          if (valor && typeof filtrarCapa === "function") {
                              filtrarCapa();
                          }
                          break;
                      }
                  }
              }
          }, 200); // revisa cada 200ms hasta que aparezca
      });
    </script>
